name: 🐛 Bug Report
description: Report a problem with the Appium Lens plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
      placeholder: When I clicked "Install All Missing", ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the Appium Lens tool window
        2. Go to the Setup tab
        3. ...
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "1.1.1"
    validations:
      required: true
  - type: input
    id: ide-version
    attributes:
      label: IDE & version
      placeholder: "IntelliJ IDEA 2025.2.3"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any errors from Help → Show Log in Finder/Explorer, or the plugin terminal output.
      render: shell
