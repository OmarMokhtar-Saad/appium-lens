<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="512" height="512">
    <rect width="40" height="40" fill="none"/>
    <!-- Background circle -->
    <circle cx="20" cy="20" r="19" fill="#2B5CE6" opacity="0.12"/>
    <!-- Smartphone outline -->
    <rect x="11" y="5" width="18" height="30" rx="3" ry="3"
          fill="none" stroke="#2B5CE6" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Home button indicator -->
    <circle cx="20" cy="32" r="1.2" fill="#2B5CE6" opacity="0.7"/>
    <!-- Appium wheel / magnifier lens -->
    <circle cx="20" cy="19" r="5.5"
            fill="none" stroke="#2B5CE6" stroke-width="2"
            stroke-linecap="round"/>
    <!-- Lens cross-hairs -->
    <line x1="20" y1="14.5" x2="20" y2="17" stroke="#2B5CE6" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="20" y1="21" x2="20" y2="23.5" stroke="#2B5CE6" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="14.5" y1="19" x2="17" y2="19" stroke="#2B5CE6" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="23" y1="19" x2="25.5" y2="19" stroke="#2B5CE6" stroke-width="1.6" stroke-linecap="round"/>
</svg>
