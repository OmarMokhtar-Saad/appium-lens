<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3AA0FF"/>
      <stop offset="1" stop-color="#0A57D0"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.42" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EAF3FF"/>
      <stop offset="1" stop-color="#C7DEFF"/>
    </radialGradient>
  </defs>

  <!-- App-icon background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Lens barrel: outer ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#FFFFFF" stroke-width="16" opacity="0.95"/>

  <!-- Aperture / glass center -->
  <circle cx="256" cy="256" r="78" fill="url(#glass)"/>

  <!-- Appium wheel spokes (between inner glass and outer ring) -->
  <g stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" opacity="0.95">
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(0 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(45 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(90 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(135 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(180 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(225 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(270 256 256)"/>
    <line x1="256" y1="178" x2="256" y2="116" transform="rotate(315 256 256)"/>
  </g>

  <!-- Central hub -->
  <circle cx="256" cy="256" r="30" fill="#0A57D0"/>
  <circle cx="256" cy="256" r="30" fill="none" stroke="#FFFFFF" stroke-width="8"/>

  <!-- Glass specular highlight -->
  <ellipse cx="230" cy="228" rx="26" ry="16" fill="#FFFFFF" opacity="0.55" transform="rotate(-35 230 228)"/>
</svg>
